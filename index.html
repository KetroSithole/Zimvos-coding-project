<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cape Town Luxury Properties</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f5f7fa; color: #333; display: flex; flex-direction: column; align-items: center;">

    <header style="background: #1a252f; color: white; width: 100%; text-align: center; padding: 20px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <h1 style="margin: 0; font-size: 24px; letter-spacing: 1px;">Cape Town Real Estate</h1>
    </header>

    <main style="background: white; max-width: 400px; width: 90%; margin: 40px auto; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); overflow: hidden;">
        
        <div style="background: linear-gradient(135deg, #34495e, #2c3e50); color: white; height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px;">
            <span style="font-size: 38px; margin-bottom: 10px;">🌅</span>

        </div>
        
        <div style="padding: 24px;">
            <p style="text-transform: uppercase; font-size: 11px; font-weight: bold; color: #3498db; margin: 0 0 5px 0; letter-spacing: 1px;">For Sale</p>
            <h2 style="margin: 0 0 10px 0; font-size: 22px; color: #2c3e50;">3 Bedroom Beachside Oasis</h2>
            <p style="color: #7f8c8d; font-size: 14px; line-height: 1.5; margin: 0 0 20px 0;">
                Experience ultimate luxury with panoramic Atlantic Ocean views, a private infinity pool, and state-of-the-art finishes just steps from the beach.
            </p>
            
            <div style="display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #ecf0f1; padding-top: 15px;">
                <span style="font-size: 20px; font-weight: bold; color: #2c3e50;">R 18,500,000</span>
                <a href="mailto:agent@example.com" style="background-color: #2ecc71; color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 14px; transition: 0.2s;">Enquire</a>
            </div>
        </div>
    </main>

    <footer style="margin: 20px 0; font-size: 12px; color: #95a5a6;">
        &copy; 2026 Cape Town Premium Living
    </footer>

</body>
